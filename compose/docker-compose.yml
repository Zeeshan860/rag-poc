name: rag-poc

services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull nomic-embed-text &&
        ollama pull llama3.2:3b &&
        echo "Models ready"
    restart: "no"

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: llama3.2:3b
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - chroma_data:/data/chroma

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ollama_data:
  chroma_data:
