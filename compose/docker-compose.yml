name: rag-poc

services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: llama3.2:3b
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - chroma_data:/data/chroma

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ollama_data:
  chroma_data:
